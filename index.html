<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ผลงาน / Reports Noparat Asampinsap</title>

  <style>
    :root{
      --bg:#0b1020; --card:rgba(255,255,255,.06); --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65); --border:rgba(255,255,255,.14);
      --shadow:0 18px 60px rgba(0,0,0,.45); --radius:16px;
    }
    *{box-sizing:border-box}

    /* กัน copy ระดับหน้าเว็บ */
    body{
      margin:0;
      font-family: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 20% 0%, rgba(99,102,241,.25), transparent 60%),
        radial-gradient(900px 650px at 85% 18%, rgba(34,197,94,.18), transparent 55%),
        var(--bg);
      min-height:100vh;

      -webkit-user-select:none;
      -moz-user-select:none;
      -ms-user-select:none;
      user-select:none;
    }

    /* อนุญาตให้ select ในช่องค้นหา */
    input, textarea{
      -webkit-user-select:text !important;
      -moz-user-select:text !important;
      -ms-user-select:text !important;
      user-select:text !important;
    }

    .wrap{max-width:1500px;margin:0 auto;padding:18px 14px 20px}
    header{
      display:flex;gap:12px;flex-wrap:wrap;
      align-items:flex-end;justify-content:space-between;
      margin-bottom:12px
    }
    h1{margin:0;font-size:24px}
    .sub{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:9px 12px;border-radius:999px;border:1px solid var(--border);
      background:rgba(255,255,255,.04);color:var(--text);text-decoration:none;font-size:13px;
    }
    .pill:hover{background:rgba(255,255,255,.07)}

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    /* ✅ Viewer เต็มกว้าง */
    .viewer{
      display:grid;
      grid-template-rows:auto 1fr;
      height: calc(100vh - 120px);
      min-height: 520px;
    }
    .viewer-head{
      padding:12px 14px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    }
    .viewer-title strong{font-size:14px}
    .viewer-title span{font-size:12px;color:var(--muted)}
    iframe{
      width:100%;
      height:100%;
      border:0;
      background:rgba(0,0,0,.22);
    }
    .hint{padding:16px;color:var(--muted);font-size:13px;line-height:1.6}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.12)}
    footer{margin-top:10px;text-align:center;color:rgba(255,255,255,.55);font-size:12px}

    /* ✅ ปุ่ม hamburger ลอย */
    .fab{
      position:fixed;
      left:18px;
      bottom:18px;
      z-index:50;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.35);
      color:var(--text);
      cursor:pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 16px 50px rgba(0,0,0,.5);
    }
    .fab:hover{background:rgba(0,0,0,.45)}
    .fab .dot{
      width:8px;height:8px;border-radius:999px;background:rgba(99,102,241,.9);
      box-shadow:0 0 0 4px rgba(99,102,241,.25);
    }

    /* ✅ Drawer รายการไฟล์ (ซ่อนไว้ เปิดด้วย hamburger) */
    .drawer-backdrop{
      position:fixed; inset:0;
      background:rgba(0,0,0,.55);
      z-index:60;
      display:none;
    }
    .drawer-backdrop.open{ display:block; }

    .drawer{
      position:fixed;
      top:0; left:0;
      height:100vh;
      width:min(420px, 92vw);
      z-index:70;
      transform: translateX(-100%);
      transition: transform .18s ease;
      display:grid;
      grid-template-rows:auto auto 1fr;
    }
    .drawer.open{ transform: translateX(0); }

    .drawer-head{
      padding:14px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .drawer-head strong{font-size:14px}
    .xbtn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
    }
    .xbtn:hover{background:rgba(255,255,255,.07)}
    .drawer-search{padding:14px;border-bottom:1px solid var(--border)}
    .drawer-search input{
      width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);
      background:rgba(0,0,0,.18);color:var(--text);outline:none;
    }
    .drawer-meta{padding:0 14px 12px;color:var(--muted);font-size:12px}
    .tag{display:inline-block;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:999px}

    .list{overflow:auto}
    .item{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:grid;gap:6px;cursor:pointer}
    .item:hover{background:rgba(255,255,255,.05)}
    .item.active{background:rgba(99,102,241,.16)}
    .name{font-weight:650;font-size:14px;display:flex;gap:8px;align-items:center}
    .file{color:var(--muted);font-size:12px;display:flex;gap:10px;flex-wrap:wrap}

    @media (max-width:700px){
      .viewer{ height: calc(100vh - 140px); }
      .fab{ left:14px; bottom:14px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>ผลงาน / Reports</h1>
        <p class="sub">กดปุ่มเมนู (☰) เพื่อเลือกไฟล์ • PDF จะเต็มจอมากที่สุด</p>
      </div>
      <div class="actions">
        <a class="pill" href="README.md" target="_blank" rel="noopener noreferrer">📄 README</a>
        <a class="pill" href="#" id="copyLink">🔗 คัดลอกลิงก์หน้านี้</a>
      </div>
    </header>

    <!-- ✅ PDF Viewer เต็มกว้าง -->
    <section class="card viewer">
      <div class="viewer-head">
        <div class="viewer-title">
          <strong id="vName">เลือกไฟล์จากเมนู</strong><br/>
          <span id="vSub">ระบบจะพรีวิว PDF ที่นี่</span>
        </div>
      </div>

      <div id="viewerBody">
        <div class="hint">
          - กดปุ่มเมนู (☰) มุมซ้ายล่างเพื่อเปิดรายการไฟล์<br/>
          - ไฟล์ต้องอยู่ใน repo เดียวกับ <code>index.html</code> และสะกดชื่อให้ตรง
        </div>
      </div>
    </section>

    <footer>© • Hosted on GitHub Pages</footer>
  </div>

  <!-- ✅ Hamburger button -->
  <button class="fab" id="fabMenu" type="button" aria-label="Open reports menu">
    <span class="dot" aria-hidden="true"></span>
    <span>Reports</span>
    <span aria-hidden="true">☰</span>
  </button>

  <!-- ✅ Drawer -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <aside class="card drawer" id="drawer" aria-label="Reports drawer">
    <div class="drawer-head">
      <strong>เลือกไฟล์ PDF</strong>
      <button class="xbtn" id="closeDrawer" type="button">✕</button>
    </div>

    <div class="drawer-search">
      <input id="q" type="search" placeholder="ค้นหาชื่อไฟล์ เช่น caat, krungsri, supalai..." />
      <div class="drawer-meta" style="margin-top:10px">
        <span class="tag" id="count">0 files</span>
      </div>
    </div>

    <div class="list" id="list"></div>
  </aside>

  <script>
    // กันคลิกขวา (ระดับหน้าเว็บ)
    document.addEventListener("contextmenu", (e) => e.preventDefault());

    // กันคีย์ลัดหลัก ๆ (ระดับหน้าเว็บ)
    document.addEventListener("keydown", (e) => {
      const key = (e.key || "").toLowerCase();
      const ctrl = e.ctrlKey || e.metaKey;

      // allow in input/search
      const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : "";
      const typing = tag === "input" || tag === "textarea";
      if (typing) return;

      if (ctrl && ["c","x","s","p","u","a"].includes(key)) e.preventDefault();
      if (e.key === "F12") e.preventDefault();
      if (ctrl && e.shiftKey && ["i","j","c"].includes(key)) e.preventDefault();

      if (e.key === "Escape") closeDrawer();
    });

    const files = [
      { file: "ais-fibre-report-dec-2025.pdf", label: "AIS Fibre Monthly Report (Dec 2025)" },
      { file: "caat-report-2025.pdf",          label: "CAAT Report (2025)" },
      { file: "krungsri-report.pdf",           label: "Krungsri Consumer Social Dashboard" },
      { file: "supalai-report-mar-2025.pdf",   label: "Supalai Monthly Report (Mar 2025)" },
    ];

    const drawer = document.getElementById("drawer");
    const backdrop = document.getElementById("drawerBackdrop");
    const fab = document.getElementById("fabMenu");
    const closeBtn = document.getElementById("closeDrawer");

    const elList = document.getElementById("list");
    const elQ = document.getElementById("q");
    const elCount = document.getElementById("count");

    const vName = document.getElementById("vName");
    const vSub = document.getElementById("vSub");
    const viewerBody = document.getElementById("viewerBody");

    function esc(s){
      return String(s).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      })[m]);
    }

    function openDrawer(){
      drawer.classList.add("open");
      backdrop.classList.add("open");
      setTimeout(() => elQ.focus(), 0);
    }
    function closeDrawer(){
      drawer.classList.remove("open");
      backdrop.classList.remove("open");
    }

    fab.addEventListener("click", openDrawer);
    closeBtn.addEventListener("click", closeDrawer);
    backdrop.addEventListener("click", closeDrawer);

    function highlightActive(file){
      document.querySelectorAll(".item").forEach(it=>{
        it.classList.toggle("active", it.dataset.file === file);
      });
    }

    function openFile(file, label){
      highlightActive(file);
      vName.textContent = label || file;
      vSub.textContent = file;

      // พยายามซ่อน toolbar ของ PDF viewer (แล้วแต่ browser)
      const src = "./" + file + "#view=FitH&toolbar=0&navpanes=0&scrollbar=0";
      viewerBody.innerHTML = `<iframe src="${encodeURI(src)}" title="${esc(label || file)}"></iframe>`;

      closeDrawer();
    }

    function render(){
      const q = (elQ.value || "").trim().toLowerCase();
      const filtered = files.filter(x => (x.file + " " + x.label).toLowerCase().includes(q));

      elCount.textContent = `${filtered.length} files`;
      elList.innerHTML = "";

      filtered.forEach(x => {
        const div = document.createElement("div");
        div.className = "item";
        div.dataset.file = x.file;
        div.innerHTML = `
          <div class="name">📘 ${esc(x.label)}</div>
          <div class="file">
            <span class="tag">${esc(x.file)}</span>
            <span class="tag">PDF</span>
          </div>
        `;
        div.addEventListener("click", () => openFile(x.file, x.label));
        elList.appendChild(div);
      });

      // เปิดอันแรกเป็นค่าเริ่มต้น
      if (filtered.length && !document.querySelector(".item.active")) {
        openFile(filtered[0].file, filtered[0].label);
      }
    }

    elQ.addEventListener("input", render);

    document.getElementById("copyLink").addEventListener("click", async (e) => {
      e.preventDefault();
      try { await navigator.clipboard.writeText(location.href); alert("คัดลอกลิงก์แล้ว"); }
      catch { prompt("คัดลอกลิงก์ด้วยตัวเอง:", location.href); }
    });

    render();
  </script>
</body>
</html>
