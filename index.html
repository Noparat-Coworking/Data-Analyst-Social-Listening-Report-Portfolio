<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ผลงาน / Reports Noparat Asampinsap</title>

  <style>
    :root{
      --bg:#0b1020; --card:rgba(255,255,255,.06); --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65); --border:rgba(255,255,255,.14);
      --shadow:0 18px 60px rgba(0,0,0,.45); --radius:16px;
      --sideWide: 320px;
      --sideMini: 72px;
      --topH: 120px; /* ประมาณ header height */
    }
    *{box-sizing:border-box}

    /* กัน copy ระดับหน้าเว็บ */
    body{
      margin:0;
      font-family: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 20% 0%, rgba(99,102,241,.25), transparent 60%),
        radial-gradient(900px 650px at 85% 18%, rgba(34,197,94,.18), transparent 55%),
        var(--bg);
      min-height:100vh;
      -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
    }
    input, textarea{
      -webkit-user-select:text !important; -moz-user-select:text !important;
      -ms-user-select:text !important; user-select:text !important;
    }

    .wrap{max-width:1500px;margin:0 auto;padding:18px 14px 20px}
    header{
      display:flex;gap:12px;flex-wrap:wrap;
      align-items:flex-end;justify-content:space-between;
      margin-bottom:12px
    }
    h1{margin:0;font-size:24px}
    .sub{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:9px 12px;border-radius:999px;border:1px solid var(--border);
      background:rgba(255,255,255,.04);color:var(--text);text-decoration:none;font-size:13px;
    }
    .pill:hover{background:rgba(255,255,255,.07)}

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    /* ✅ Layout: Sidebar + Viewer */
    .grid{
      display:grid;
      grid-template-columns: var(--sideWide) 1fr;
      gap:12px;
      align-items:stretch;
      transition: grid-template-columns .18s ease;
      min-height: calc(100vh - var(--topH));
    }
    .grid.collapsed{
      grid-template-columns: var(--sideMini) 1fr; /* ✅ หด sidebar */
    }

    /* Sidebar */
    .side{
      display:grid;
      grid-template-rows: auto auto 1fr;
      min-height: calc(100vh - var(--topH));
    }
    .side-head{
      padding:12px 12px 10px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .side-head strong{font-size:13px}
    .toggle{
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
      display:inline-flex;align-items:center;gap:8px;
    }
    .toggle:hover{background:rgba(255,255,255,.07)}
    .side-search{padding:12px;border-bottom:1px solid var(--border)}
    .side-search input{
      width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);
      background:rgba(0,0,0,.18);color:var(--text);outline:none;
    }
    .side-meta{padding:0 12px 10px;color:var(--muted);font-size:12px}
    .tag{display:inline-block;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:999px}

    .list{overflow:auto}
    .item{padding:12px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:grid;gap:6px;cursor:pointer}
    .item:hover{background:rgba(255,255,255,.05)}
    .item.active{background:rgba(99,102,241,.16)}
    .name{font-weight:650;font-size:14px;display:flex;gap:8px;align-items:center}
    .file{color:var(--muted);font-size:12px;display:flex;gap:10px;flex-wrap:wrap}

    /* ✅ ตอน sidebar หด: ซ่อน text/ค้นหา ให้เหลือแค่ไอคอน */
    .grid.collapsed .side-search,
    .grid.collapsed .side-meta,
    .grid.collapsed .file{
      display:none;
    }
    .grid.collapsed .side-head{
      justify-content:center;
      padding:12px 8px;
    }
    .grid.collapsed .side-head strong{ display:none; }
    .grid.collapsed .item{
      padding:12px 8px;
      justify-items:center;
    }
    .grid.collapsed .name{
      font-size:0; /* ซ่อน label */
      gap:0;
    }
    .grid.collapsed .name::before{
      content:"📘";
      font-size:18px;
    }

    /* Viewer */
    .viewer{
      display:grid;
      grid-template-rows:auto 1fr;
      min-height: calc(100vh - var(--topH));
    }
    .viewer-head{
      padding:12px 14px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    }
    .viewer-title strong{font-size:14px}
    .viewer-title span{font-size:12px;color:var(--muted)}
    iframe{width:100%;height:100%;border:0;background:rgba(0,0,0,.22)}
    .hint{padding:16px;color:var(--muted);font-size:13px;line-height:1.6}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.12)}
    footer{margin-top:10px;text-align:center;color:rgba(255,255,255,.55);font-size:12px}

    /* ✅ Mobile: sidebar แปลงเป็น drawer */
    @media (max-width:900px){
      .grid{grid-template-columns: 1fr;}
      .side{
        position:fixed; left:0; top:0;
        height:100vh; width:min(420px, 92vw);
        z-index:70;
        transform: translateX(-100%);
        transition: transform .18s ease;
      }
      .side.open{ transform: translateX(0); }
      .backdrop{
        position:fixed; inset:0; background:rgba(0,0,0,.55);
        z-index:60; display:none;
      }
      .backdrop.open{display:block;}
      .mobileFab{
        position:fixed; left:16px; bottom:16px; z-index:80;
        border:1px solid var(--border);
        background:rgba(0,0,0,.35);
        color:var(--text);
        border-radius:999px;
        padding:12px 14px;
        cursor:pointer;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 16px 50px rgba(0,0,0,.5);
      }
      .mobileFab:hover{background:rgba(0,0,0,.45)}
      .grid.collapsed{grid-template-columns:1fr;} /* ไม่ใช้ collapsed บน mobile */
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>ผลงาน / Reports</h1>
        <p class="sub">Sidebar ซ้าย “หด/ขยาย” ได้ เพื่อเพิ่มพื้นที่อ่าน PDF</p>
      </div>
      <div class="actions">
        <a class="pill" href="README.md" target="_blank" rel="noopener noreferrer">📄 README</a>
        <a class="pill" href="#" id="copyLink">🔗 คัดลอกลิงก์หน้านี้</a>
      </div>
    </header>

    <div class="grid card" id="grid">
      <!-- Sidebar -->
      <aside class="side" id="side">
        <div class="side-head">
          <strong>รายการไฟล์</strong>
          <button class="toggle" id="toggleSide" type="button" title="ย่อ/ขยาย">
            <span id="toggleIcon">⟨⟩</span>
            <span class="toggleText">ย่อ</span>
          </button>
        </div>

        <div class="side-search">
          <input id="q" type="search" placeholder="ค้นหา เช่น caat, krungsri..." />
          <div class="side-meta" style="margin-top:10px">
            <span class="tag" id="count">0 files</span>
          </div>
        </div>

        <div class="list" id="list"></div>
      </aside>

      <!-- Viewer -->
      <section class="viewer">
        <div class="viewer-head">
          <div class="viewer-title">
            <strong id="vName">เลือกไฟล์ทางซ้าย</strong><br/>
            <span id="vSub">ระบบจะพรีวิว PDF ที่นี่</span>
          </div>
        </div>

        <div id="viewerBody">
          <div class="hint">
            - กดปุ่ม “ย่อ” ที่ sidebar เพื่อขยายพื้นที่ PDF<br/>
            - ไฟล์ต้องอยู่ใน repo เดียวกับ <code>index.html</code> และสะกดชื่อให้ตรง
          </div>
        </div>
      </section>
    </div>

    <footer>© • Hosted on GitHub Pages</footer>
  </div>

  <!-- Mobile drawer helpers -->
  <div class="backdrop" id="backdrop"></div>
  <button class="mobileFab" id="mobileFab" type="button" style="display:none;">☰ Reports</button>

  <script>
    // กันคลิกขวา (ระดับหน้าเว็บ)
    document.addEventListener("contextmenu", (e) => e.preventDefault());

    // กันคีย์ลัดหลัก ๆ (ระดับหน้าเว็บ)
    document.addEventListener("keydown", (e) => {
      const key = (e.key || "").toLowerCase();
      const ctrl = e.ctrlKey || e.metaKey;

      // allow in input/search
      const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : "";
      const typing = tag === "input" || tag === "textarea";
      if (typing) return;

      if (ctrl && ["c","x","s","p","u","a"].includes(key)) e.preventDefault();
      if (e.key === "F12") e.preventDefault();
      if (ctrl && e.shiftKey && ["i","j","c"].includes(key)) e.preventDefault();

      // ESC ปิด sidebar ใน mobile
      if (e.key === "Escape") closeMobileSide();
    });

    const files = [
      { file: "ais-fibre-report-dec-2025.pdf", label: "AIS Fibre Monthly Report (Dec 2025)" },
      { file: "caat-report-2025.pdf",          label: "CAAT Report (2025)" },
      { file: "krungsri-report.pdf",           label: "Krungsri Consumer Social Dashboard" },
      { file: "supalai-report-mar-2025.pdf",   label: "Supalai Monthly Report (Mar 2025)" },
    ];

    const grid = document.getElementById("grid");
    const side = document.getElementById("side");
    const toggleBtn = document.getElementById("toggleSide");
    const toggleIcon = document.getElementById("toggleIcon");

    const elList = document.getElementById("list");
    const elQ = document.getElementById("q");
    const elCount = document.getElementById("count");

    const vName = document.getElementById("vName");
    const vSub = document.getElementById("vSub");
    const viewerBody = document.getElementById("viewerBody");

    const backdrop = document.getElementById("backdrop");
    const mobileFab = document.getElementById("mobileFab");

    function esc(s){
      return String(s).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      })[m]);
    }

    function highlightActive(file){
      document.querySelectorAll(".item").forEach(it=>{
        it.classList.toggle("active", it.dataset.file === file);
      });
    }

    function openFile(file, label){
      highlightActive(file);
      vName.textContent = label || file;
      vSub.textContent = file;

      // พยายามซ่อน toolbar ของ PDF viewer (แล้วแต่ browser)
      const src = "./" + file + "#view=FitH&toolbar=0&navpanes=0&scrollbar=0";
      viewerBody.innerHTML = `<iframe src="${encodeURI(src)}" title="${esc(label || file)}"></iframe>`;

      // เลือกแล้ว: ถ้า desktop ให้หด sidebar อัตโนมัติ
      if (!isMobile()) collapseSidebar(true);

      // ถ้า mobile ให้ปิด drawer
      closeMobileSide();
    }

    function render(){
      const q = (elQ.value || "").trim().toLowerCase();
      const filtered = files.filter(x => (x.file + " " + x.label).toLowerCase().includes(q));

      elCount.textContent = `${filtered.length} files`;
      elList.innerHTML = "";

      filtered.forEach(x => {
        const div = document.createElement("div");
        div.className = "item";
        div.dataset.file = x.file;
        div.innerHTML = `
          <div class="name">📘 ${esc(x.label)}</div>
          <div class="file">
            <span class="tag">${esc(x.file)}</span>
            <span class="tag">PDF</span>
          </div>
        `;
        div.addEventListener("click", () => openFile(x.file, x.label));
        elList.appendChild(div);
      });

      if (filtered.length && !document.querySelector(".item.active")) {
        openFile(filtered[0].file, filtered[0].label);
      }
    }

    function isMobile(){
      return window.matchMedia("(max-width: 900px)").matches;
    }

    function collapseSidebar(collapsed){
      if (collapsed) grid.classList.add("collapsed");
      else grid.classList.remove("collapsed");

      // update button label
      if (grid.classList.contains("collapsed")){
        toggleIcon.textContent = "☰";
        toggleBtn.querySelector(".toggleText").textContent = "ขยาย";
      } else {
        toggleIcon.textContent = "⟨⟩";
        toggleBtn.querySelector(".toggleText").textContent = "ย่อ";
      }
    }

    toggleBtn.addEventListener("click", () => {
      collapseSidebar(!grid.classList.contains("collapsed"));
    });

    elQ.addEventListener("input", render);

    document.getElementById("copyLink").addEventListener("click", async (e) => {
      e.preventDefault();
      try { await navigator.clipboard.writeText(location.href); alert("คัดลอกลิงก์แล้ว"); }
      catch { prompt("คัดลอกลิงก์ด้วยตัวเอง:", location.href); }
    });

    // Mobile drawer controls
    function openMobileSide(){
      side.classList.add("open");
      backdrop.classList.add("open");
      setTimeout(() => elQ.focus(), 0);
    }
    function closeMobileSide(){
      side.classList.remove("open");
      backdrop.classList.remove("open");
    }
    backdrop.addEventListener("click", closeMobileSide);
    mobileFab.addEventListener("click", openMobileSide);

    // Show mobile fab only on mobile
    function syncMobileUI(){
      if (isMobile()){
        mobileFab.style.display = "";
      } else {
        mobileFab.style.display = "none";
        closeMobileSide();
      }
    }
    window.addEventListener("resize", syncMobileUI);

    // init
    syncMobileUI();
    // เริ่มต้นให้ sidebar หด เพื่อให้ PDF กว้างสุด
    collapseSidebar(true);
    render();
  </script>
</body>
</html>
